<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form</title>
</head>

<body>
  <form>
    <table>
        <tr>
          <td colspan="2">
            <h2><span>Donor Information</span></h2>
          </td>
        </tr>
        <tr>
          <td><label for="firstname">First Name<span>*</span></label></td>
          <td><input type="text" id="firstname" name="firstname" required></td>
        </tr>
        <tr>
          <td><label for="lastname">Last Name<span>*</span></label></td>
          <td><input type="text" id="lastname" name="lastname" required></td>
        </tr>
        <tr>
          <td><label for="company">Company</label></td>
          <td><input type="text" id="company" name="company"></td>
        </tr>
        <tr>
          <td><label for="adress1">Adress 1<span>*</span></label></td>
          <td><input type="text" id="adress1" name="adress1" required></td>
        </tr>
        <tr>
          <td><label for="adress2">Adress 2</label></td>
          <td><input type="text" id="adress2" name="adress2" ></td>
        </tr>
        <tr>
          <td><label for="city">City<span>*</span></label></td>
          <td><input type="text" id="city" name="city" required></td>
        </tr>
        <tr>
          <td><label for="state">State<span>*</span></label><br></td>
          <td><select id="state" name="state" required>
              <option value="">-- Select a State --</option>
              <option value="meherpur">Meherpur</option>
              <option value="chuadanga">Chuadanga</option>
              <option value="khustia">Khustia</option>
              <option value="dhaka">Dhaka</option>
              <option value="chittagong">Chittagong</option>
            </select></td>
        </tr>
        <tr>
          <td><label for="zipcode">ZipCode<span>*</span></label></td>
          <td><input type="number"id="zipcode" name="zipcode" required></td>
        </tr>
        <tr>
          <td><label for="country">Country<span>*</span></label><br></td>
          <td><select id="country" name="country" required>
              <option value="">-- Select a Country --</option>
              <option value="bangladesh">Bangladesh</option>
              <option value="usa">USA</option>
              <option value="aus">Australia</option>
            </select></td>
        </tr>
        <tr>
          <td><label for="phone">Phone</label></td>
          <td><input type="text" id="phone" name="phone" ></td>
        </tr>
        <tr>
          <td><label for="fax">Fax</label></td>
          <td><input type="text"  pattern="[a-z]+[0-9]" id="fax" name="fax" ></td>
        </tr>
        <tr>
          <td><label for="email">Email<span>*</span></label></td>
          <td><input type="text" id="email" name="email" required></td>
        </tr>
        <tr>
          <td><label>Donation Amount<span>*</span> <br> (Check a button or type in your <br> amount)</label> <br>
            <label></label>
        </td>
          <td>
            <label><input type="radio" name="donationamount" value="none"> None</label>
            <label><input type="radio" name="donationamount" value="$50"> $50</label>
            <label><input type="radio" name="donationamount" value="$75"> $75</label>
            <label><input type="radio" name="donationamount" value="$100"> $100</label>
            <label><input type="radio" name="donationamount" value="$250"> $250</label>
            <label><input type="radio" name="donationamount" value="other"> Other</label>
          </td>
        </tr>
        <tr>
        <td><label></label></td>
          <td><label for="otheramount">other Amount $ </label>
          <input type="number" id="otheramount" name="otheramount" ></td>
        </tr>
        <tr>
          <td><label for="recurring_donation">Recurring Donation <br> (Check if yes) </label></td>
          <td><input type="checkbox"name="recurring_donation"value="yes"  >I am intrested in givinig on a regular basis.</td>
        </tr>
        <tr>
            <td></td>
            <td>
                <label for="monthlycredit">Monthly Credit Card $ </label>
                <input type="number" id="monthlycredit" name="monthlycredit">
                <label for="for">for</label>
                <input type="number" id="for" name="for">
                <label>months</label> </td>
        </tr>

        <tr>
          <td colspan="2">
            <h2><span>Honorium and Memorial Donation Information</span></h2>
          </td>
        </tr>
        <tr>
          <td><label>I Would like to make this donation</label></td>
          <td>
            <label><input type="radio"  id="tohonor" name="donation" value="tohonor"> To Honor</label>
            <label><input type="radio" id="inmemoryof" name="donation" value="inmemoryof"> In Memory of</label>
          </td>
        </tr>
        <tr>
          <td><label for="name">Name</label></td>
          <td><input type="text" id="name" name="name" ></td>
        </tr>
        <tr>
          <td><label for="donationto">Acknowledge Donation to</label></td>
          <td><input type="text" id="donationto" name="donationto" ></td>
        </tr>
        <tr>
          <td><label for="adress">Adress</label></td>
          <td><input type="text" id="adress" name="adress" ></td>
        </tr>
        <tr>
          <td><label for="city">City</label></td>
          <td><input type="text" id="city" name="city" ></td>
        </tr>
        <tr>
          <td><label for="state">State</label><br></td>
          <td><select id="state" name="state">
              <option value="">-- Select a State --</option>
              <option value="meherpur">Meherpur</option>
              <option value="chuadanga">Chuadanga</option>
              <option value="khustia">Khustia</option>
              <option value="dhaka">Dhaka</option>
              <option value="chittagong">Chittagong</option>
            </select></td>
        </tr>
        <tr>
          <td><label for="zip">Zip</label></td>
          <td><input type="text"  pattern="[0-9]" id="zip" name="zip" ></td>
        </tr>

        <tr>
          <td colspan="2">
            <h2> <span>Additional Information</span></h2>
          </td>
        </tr>
        <tr>
          <td colspan="2"> <label>Please enter your name, Company or organization as you would like it to appear in our publications:</label></td>
        </tr>
        <tr>
          <td><label for="pub_name">Name</label></td>
          <td><input type="text" id="pub_name" name="pub_name" ></td>
        </tr>
        <tr>
          <td colspan="2">
            <input type="checkbox" id="anonymous" name="anonymous">
            <label for="anonymous">I would like to gift to remian anonymous.</label>
          </td>
        </tr>
        <tr><td colspan="2">
           <input type="checkbox" id="matching" name="matching">
            <label for="matching">My employer offers a matching gift program. I will mail the matching gift form.</label>
        </td></tr>
        
        <tr><td colspan="2">
           <input type="checkbox" id="nosave" name="nosave">
            <label for="nosave">Please save the cost of Acknowledging this gift by not mailing a thank you letter.</label>
        </td></tr>

        <tr><td><label for="comments">Comments<br>(Please type any questions or feedback here)</label></td>
          <td><textarea id="comments" name="comments"></textarea></td>
        </tr>

        <tr><td><label>How may we contact you?</label></td>
          <td>
            <input type="checkbox" id="c_email" name="contact" value="email"> <label for="c_email">E-mail</label><br>
            <input type="checkbox" id="c_mail" name="contact" value="mail"> <label for="c_mail">Postal Mail</label><br>
            <input type="checkbox" id="c_phone" name="contact" value="phone"> <label for="c_phone">Telephone</label><br>
            <input type="checkbox" id="c_fax" name="contact" value="fax"> <label for="c_fax">Fax</label>
          </td></tr>
          <tr><td colspan="2"><label>I would like to receive newsletters and information about special events by:</label></td>
          </tr>
          <tr>
            <td></td>
            <td>
              <input type="checkbox" id="n_email" name="newsletter" value="email"> <label for="n_email">E-mail</label><br>
              <input type="checkbox" id="n_mail" name="newsletter" value="mail"> <label for="n_mail">Postal Mail</label>
            </td>
          </tr>
          <tr>
            <td colspan="2">
               <input type="checkbox" id="volunteer" name="volunteer">
               <label for="volunteer">I would like information about volunteering with the organization.</label>
              </td>
            </tr>
            <tr>
              <td>
                <button type="reset">Reset</button></td>
                <td>
                  <button type="submit">Continue</button>
                </td>
              </tr>
            </table>
          </form>
        </body>
        </html>
