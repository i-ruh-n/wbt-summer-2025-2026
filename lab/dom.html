<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Form(DOM)</title>
</head>
 
<body>
 
    <form id="myForm">
        <table border="0">
            <tr>
                <td colspan="2">
                    <h2>Donor Information</h2>
                </td>
            </tr>
 
            <tr>
                <td>First Name *</td>
                <td><input type="text" id="firstname"></td>
            </tr>
 
            <tr>
                <td>Last Name *</td>
                <td><input type="text" id="lastname"></td>
            </tr>
 
            <tr>
                <td>Company</td>
                <td><input type="text" id="company"></td>
            </tr>
 
            <tr>
                <td>Address 1 *</td>
                <td><input type="text" id="address1"></td>
            </tr>
 
            <tr>
                <td>Address 2</td>
                <td><input type="text" id="address2"></td>
            </tr>
 
            <tr>
                <td>City *</td>
                <td><input type="text" id="city"></td>
            </tr>
 
            <tr>
                <td>State *</td>
                <td>
                    <select id="state">
                        <option value="">--Select State--</option>
                        <option>Meherpur</option>
                        <option>Chuadanga</option>
                        <option>Kushtia</option>
                        <option>Dhaka</option>
                    </select>
                </td>
            </tr>
 
            <tr>
                <td>Zip Code *</td>
                <td><input type="number" id="zipcode"></td>
            </tr>
 
            <tr>
                <td>Country *</td>
                <td>
                    <select id="country">
                        <option value="">--Select Country--</option>
                        <option>Bangladesh</option>
                        <option>USA</option>
                        <option>Australia</option>
                    </select>
                </td>
            </tr>
 
            <tr>
                <td>Email *</td>
                <td><input type="email" id="email"></td>
            </tr>
 
            <tr>
                <td>Donation Amount *</td>
                <td>
                    <input type="radio" name="donationamount" value="50"> $50
                    <input type="radio" name="donationamount" value="75"> $75
                    <input type="radio" name="donationamount" value="100"> $100
                    <input type="radio" name="donationamount" value="250"> $250
                </td>
            </tr>
 
            <tr>
                <td></td>
                <td>
                    <button type="reset">Reset</button>
                    <button type="submit">Submit</button>
                </td>
            </tr>
        </table>
    </form>
 
    <script>
        document.getElementById("myForm").addEventListener("submit", function (event) {
 
            var firstname = document.getElementById("firstname").value.trim();
            var lastname = document.getElementById("lastname").value.trim();
            var address1 = document.getElementById("address1").value.trim();
            var city = document.getElementById("city").value.trim();
            var state = document.getElementById("state").value;
            var zipcode = document.getElementById("zipcode").value.trim();
            var country = document.getElementById("country").value;
            var email = document.getElementById("email").value.trim();
 
            if (firstname == "" || lastname == "") {
                alert("Name must be filled out");
                event.preventDefault();
                return;
            }
 
            if (address1 == "") {
                alert("Address 1 must be filled out");
                event.preventDefault();
                return;
            }
 
            if (city == "") {
                alert("City must be filled out");
                event.preventDefault();
                return;
            }
 
            if (state == "") {
                alert("Please select a state");
                event.preventDefault();
                return;
            }
 
            if (zipcode == "") {
                alert("Zip Code must be filled out");
                event.preventDefault();
                return;
            }
 
            if (country == "") {
                alert("Please select a country");
                event.preventDefault();
                return;
            }
 
            if (email == "") {
                alert("Email must be filled out");
                event.preventDefault();
                return;
            }
 
            var donation = document.getElementsByName("donationamount");
            var selected = false;
 
            for (var i = 0; i < donation.length; i++) {
                if (donation[i].checked) {
                    selected = true;
                    break;
                }
            }
 
            if (!selected) {
                alert("Please select a donation amount");
                event.preventDefault();
                return;
            }
 
            alert("Form submitted successfully!");
        });
    </script>
 
</body>
 
</html>
